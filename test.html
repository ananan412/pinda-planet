<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>测试页面</h1>
    <button onclick="alert('按钮1点击成功！')">按钮1</button>
    <button onclick="window.location.href='index.html'">返回首页</button>
    <button onclick="document.getElementById('file-input').click()">选择文件</button>
    <input type="file" id="file-input" style="display:none;" onchange="alert('选择了文件: ' + this.files[0].name)">
</body>
</html>
